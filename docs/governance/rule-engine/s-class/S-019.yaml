rule_id: "S-019"
version: "1.0"
category: false_urgency
trigger: pre_publication
severity: flag_for_audit
description: >
  任务描述使用人为制造的紧迫感或稀缺性话术（"最后3名"、"1小时
  截止"、"今日专属"），在没有真实时间约束支撑的情况下，向潜在
  接单者施加压力，使其在未充分评估条款的情况下仓促接单。
audit_method: llm_oracle
queue: semantic_gray_queue
batch_threshold: 50
reasonableness_anchor: >
  真实时间敏感任务（活动当天布置、限时服务窗口）可合理注明截止时间。
  若紧迫性话术与实际任务性质不符（文件整理标注"仅限今日"）、
  或名额稀缺声明无法核验（"最后1名"但无历史接单记录可查），
  则判定为虚假紧迫。已标注具体截止时间戳且与任务性质匹配的
  正当截止声明不触发本规则。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"虚假紧迫感"模式。

  判断标准：
  - 使用稀缺性/限时话术但与任务性质无关联
  - 无真实时间约束支撑的"最后机会"类表述
  - PASS：有真实截止时间或确有时间敏感性的任务

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】⚡限时！今日仅剩2个名额！资料录入，积分50
      【正文】将50页纸质问卷录入表格，无时限要求，随时可做。
      本周任意时间提交均可。名额告急，手慢无！
    verdict: BLOCK
    rationale: >
      "今日仅剩2个名额"和"名额告急"与正文"无时限、本周任意时间"
      自相矛盾，虚假紧迫感明显，旨在催促接单而非反映真实约束。
  - input: >
      【标题】社区年会布置志愿者，今晚20:00截止报名
      【正文】年会定于明日上午9:00，需今晚确认人员名单以安排分工。
      报名截止20:00，逾期无法保留席位。积分80，活动结束后结算。
    verdict: PASS
    rationale: >
      截止时间（今晚20:00）与任务性质（次日活动布置需提前确认名单）
      直接关联，紧迫性有真实业务原因支撑，不属于虚假紧迫。
  - input: >
      【标题】🔥绝版任务！全年最高积分！仅此一次！调研问卷，积分200
      【正文】填写社区满意度问卷，约10分钟。长期开放，欢迎随时参与。
    verdict: BLOCK
    rationale: >
      "绝版任务""仅此一次"与"长期开放"直接矛盾，"全年最高积分"
      无任何说明支撑，全部为虚假稀缺话术，属于虚假紧迫感。
  - input: >
      【标题】节日礼品包装志愿者，春节前最后一批，名额有限
      【正文】春节礼品包装活动，截止日期为腊月二十八（2026-02-16）
      17:00，届时活动结束。预计还剩4个名额，先报先得。积分60。
    verdict: PASS
    rationale: >
      春节前截止有真实节庆依据，具体截止日期明确（2026-02-16），
      名额限制与节庆活动规模合理关联，非虚假紧迫。
confidence_threshold:
  flag: 0.6
  block: 0.8
