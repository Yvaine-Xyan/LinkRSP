rule_id: "S-022"
version: "1.0"
category: credential_misrepresentation
trigger: pre_publication
severity: block
description: >
  任务发布者在描述中虚构机构背景、专业资质或官方授权（冒称医院、
  政府机构、认证律所），以获取接单者信任或降低其对条款的警惕，
  从而诱导接单或信息提交。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  正当任务可注明发布者身份（"XX社区居委会组织"、"志愿者协会授权"）。
  触发条件为：声称具有无法在协议内核验的官方地位（"市卫健委官方"、
  "区法院委托"）、或使用模糊权威话术（"国家认证项目"、"政府指定
  供应商"）来建立超出协议范围的信任背书。社区内可核验的发布者
  身份不触发本规则。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"资质虚假宣称"模式。

  判断标准：
  - 声称无法在协议内核验的官方机构或政府授权背书
  - 使用权威话术降低接单者警惕性以诱导接单
  - PASS：发布者身份可在协议内核验，或无身份背书声明

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】市卫生健康委员会官方健康调研，填写问卷积分100
      【正文】本调研由市卫生健康委员会直接委托，数据直接上报国家
      健康大数据平台。须提供真实姓名、身份证号、家庭成员健康史。
      官方背书，请放心填写。
    verdict: BLOCK
    rationale: >
      声称"市卫健委官方委托"且要求身份证和健康史，但该背书无法
      在协议内核验，利用官方权威话术降低接单者对个人信息采集的
      警惕，属于资质虚假宣称。
  - input: >
      【标题】阳光社区居委会：端午节活动布置志愿者，积分60
      【正文】阳光社区居委会组织端午节活动，需要志愿者协助布置
      场地和包粽子示范。活动时间：6月18日上午9-12时。
    verdict: PASS
    rationale: >
      社区居委会作为发布者身份在协议社区层可核验，任务内容与
      节庆活动匹配，无虚假权威声明，不触发本规则。
  - input: >
      【标题】国家认证法律援助项目，案件材料整理，积分150
      【正文】本项目为国家司法部认证法律援助计划的组成部分，
      需整理涉密案件材料，须签署保密协议并提供律师执照扫描件。
      政府指定项目，优先录用。
    verdict: BLOCK
    rationale: >
      "国家司法部认证"和"政府指定项目"均为无法在协议内核验的
      权威声明，要求提供律师执照暗示专业门槛但来源可疑，
      属于资质虚假宣称以获取信任和专业证件。
  - input: >
      【标题】蓝天养老服务中心：老人陪伴服务，积分80/次
      【正文】蓝天养老服务中心（协议注册社区ID: C-2031）招募
      陪伴志愿者，每次上门陪伴2小时，须通过平台背景核查。
      联系协调员李女士（协议内消息）。
    verdict: PASS
    rationale: >
      注明协议社区ID（C-2031），发布者身份可在协议内核验，
      背景核查通过平台进行，无虚假权威背书，不触发本规则。
confidence_threshold:
  flag: 0.6
  block: 0.8
