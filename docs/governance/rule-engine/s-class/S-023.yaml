rule_id: "S-023"
version: "1.0"
category: youth_protection
trigger: pre_publication
severity: block
description: >
  任务描述包含以下任一情形：（1）明确招募未成年人参与存在人身风险、
  夜间单独外出或与陌生成年人一对一接触的任务；（2）内容本身不适合
  未成年人（暴力、色情擦边、赌博相关）；（3）以"亲子任务"包装实质
  上对未成年人存在风险的劳务安排。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  正当的未成年友好型任务（家庭亲子公益活动、学校组织的社区服务）
  在有成年监护人陪同且内容安全的前提下不触发本规则。触发条件为：
  单独接触（无监护人在场）、夜间/偏僻地点、体力高危任务、内容
  含有不适龄素材，或以"学生专属"话术招募未成年人参与上述场景。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中对未成年人保护的潜在违反。

  判断标准：
  - 招募未成年人进行有人身风险或不适龄的任务
  - 内容本身含有不适合未成年人的素材
  - PASS：安全的亲子/学生活动且有监护人陪同，或无未成年相关内容

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】学生兼职优先！夜间仓库盘点，22:00-02:00，积分200
      【正文】仓库货物夜间清点，工作地点偏僻，仅凭接单者单独进入。
      特别欢迎在校学生，学生证加10积分奖励。
    verdict: BLOCK
    rationale: >
      "学生优先"话术主动招募可能为未成年人的在校学生，任务为
      深夜偏僻仓库单独工作，存在明显人身安全风险，违反未成年保护。
  - input: >
      【标题】亲子公益日：公园清洁志愿者，家长陪同参与，积分30
      【正文】社区公园清洁日，欢迎家长携带子女共同参与，
      活动时间上午9-11时，公开区域，活动组织者全程在场。
      未成年须由家长全程陪同。
    verdict: PASS
    rationale: >
      亲子活动，明确要求家长全程陪同，公开区域白天进行，
      有组织者在场，内容安全，符合未成年保护要求。
  - input: >
      【标题】青少年赚零花钱！帮陌生人整理私人房间，积分80
      【正文】面向14-18岁青少年，单独上门为雇主整理卧室和储藏间。
      家长无需陪同，雇主会单独接待。
    verdict: BLOCK
    rationale: >
      明确面向未成年群体（14-18岁），要求单独上门为陌生成年人
      整理私人空间，且"家长无需陪同"，存在严重人身安全隐患，
      属于违反未成年保护的任务。
  - input: >
      【标题】学校组织：社区图书馆义务上架，积分20
      【正文】XX中学组织学生参与社区图书馆志愿服务，
      图书上架和整理，全程由学校老师和图书馆工作人员监督。
      仅对XX中学学生开放，须凭学校证明报名。
    verdict: PASS
    rationale: >
      学校组织，有老师和工作人员全程监督，内容安全，
      属于正当学生志愿服务活动，不触发本规则。
confidence_threshold:
  flag: 0.6
  block: 0.8
