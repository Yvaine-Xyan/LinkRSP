rule_id: "S-024"
version: "1.0"
category: debt_trap_mechanics
trigger: pre_publication
severity: block
description: >
  任务费用结构（押金、耗材购置、培训费、设备租用）导致接单者在
  正常完成任务的情况下，净积分收益为零或为负；或通过分期扣除
  设计使接单者长期处于积分负债状态。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  正当的成本共担机制（耗材费从积分中按比例抵扣且金额合理）在
  双方知情同意的前提下不触发本规则。触发条件为：前置费用（押金、
  购置费）之和等于或超过任务积分总量；或任务设计导致接单者在
  完成任务后的净积分低于零；或费用条款通过多步骤隐藏使总费用
  难以在接单时计算。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"债务陷阱"积分结构。

  判断标准：
  - 前置费用（押金+购置+培训）≥ 任务可得积分
  - 任务完成后净积分为零或为负
  - 费用结构分散隐藏使总成本难以计算
  - PASS：透明费用且净积分合理为正

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】社区外卖配送员，每单积分8
      【正文】须缴纳设备押金100积分，购置统一配送箱50积分，
      参加上岗培训（费用30积分）。单量保证：每日最低10单，
      但首周为"见习期"，积分减半（每单4积分）。
      见习期共5天×10单×4积分 = 200积分收入，前期费用合计180积分。
    verdict: BLOCK
    rationale: >
      见习期收入200积分，前期费用180积分，净收益仅20积分但还须
      持续工作才能"回本"，本质上通过高前置费用将接单者套牢，
      属于积分债务陷阱。
  - input: >
      【标题】社区手工制品销售助手，积分60/次
      【正文】协助销售摊位摆摊2小时，无需购置任何物品，
      积分60完成后结算。所有展示材料由发布方提供。
    verdict: PASS
    rationale: >
      无前置费用，积分60直接结算，无任何扣减结构，
      净收益透明且为正，不触发本规则。
  - input: >
      【标题】上门清洁服务，积分80/次
      【正文】须自行采购：认证清洁剂套装（指定品牌，40积分等值）、
      防护手套（10积分等值）、认证作业服（30积分等值）。
      合计须提前购置80积分等值耗材，每次任务积分80，
      耗材"理论上可用10次"但实际每次须更换。
    verdict: BLOCK
    rationale: >
      每次任务须购置80积分等值耗材（不可跨任务复用），
      与积分收入持平，净收益为零，且"理论上可用10次"的说辞
      掩盖了实际一次性消耗的事实，构成积分债务陷阱。
  - input: >
      【标题】文件打印配送，积分25/单，含耗材费
      【正文】接单后前往社区打印室打印指定文件并配送至收件人，
      打印成本2积分从积分中扣除（按页计），净收益约20-23积分。
      打印成本在结算时透明列示。
    verdict: PASS
    rationale: >
      耗材费（打印成本约2积分）合理且在结算时透明列示，
      净收益明确为正（20-23积分），不属于债务陷阱结构。
confidence_threshold:
  flag: 0.6
  block: 0.8
