rule_id: "S-025"
version: "1.0"
category: charter_harm
trigger: ipo_scan
severity: block
description: >
  社区章程或任务规则包含与 HDGP 治理约束相冲突的条款：试图覆盖
  协议规定的接单者权利、豁免规则引擎审计义务、或以"社区自治"
  名义建立游离于协议之外的私人信用/积分体系。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  社区可在协议框架内制定补充规则（加分标准、任务分类、专属技能
  认证）。触发条件为：章程明确排除协议仲裁权（"本社区纠纷不受
  协议规则引擎管辖"）、单方面废除接单者的上诉权利、或建立独立
  积分系统且不与 LRS 主账本互通/互认。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测社区章程或任务规则中对 HDGP 治理约束的破坏。

  判断标准：
  - 明确排除协议规则引擎或仲裁机制的管辖
  - 废除或限制接单者在协议层面的上诉/申诉权利
  - 建立游离于 LRS 主账本之外的独立积分体系
  - PASS：在协议框架内的补充规则，不与核心约束冲突

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【社区章程节选】第8条：本社区所有任务纠纷由社区理事会
      最终裁决，不受协议规则引擎介入，理事会决定不可申诉。
      第9条：本社区积分（"星积分"）独立运营，换算关系由理事会
      决定，不在 LRS 主账本中记录。
    verdict: BLOCK
    rationale: >
      第8条明确排除规则引擎管辖且剥夺申诉权，第9条建立游离于
      LRS 账本之外的独立积分系统，双重违反 HDGP 治理约束。
  - input: >
      【社区章程节选】第3条：本社区在 LRS 基础积分之上额外设立
      "贡献星章"（不可转让、不可兑换），用于内部荣誉排名。
      所有积分争议仍通过协议规则引擎标准流程处理。
    verdict: PASS
    rationale: >
      "贡献星章"为纯荣誉标识，不影响 LRS 积分账本，争议处理
      明确遵循协议标准流程，属于协议框架内的合法补充机制。
  - input: >
      【社区任务规则】所有接单者须签署"自愿放弃协议审计权"声明，
      同意本社区任务不受平台规则引擎自动审核，由发布方自行认定
      完成质量，接单者承诺不提起协议层申诉。
    verdict: BLOCK
    rationale: >
      要求接单者放弃协议审计权和申诉权，直接覆盖 HDGP 核心
      治理保障，属于章程破坏行为，即使以"自愿"形式包装亦然。
  - input: >
      【社区章程节选】本社区专注于手工艺任务，任务发布须附带
      材料清单和预期成品图。积分按 LRS 标准结算，质量争议
      优先由社区调解员协助，调解不成则启动协议仲裁流程。
    verdict: PASS
    rationale: >
      社区在协议框架内添加了任务发布要求（材料清单）和调解前置
      机制，最终仍归属协议仲裁，不覆盖核心治理约束。
confidence_threshold:
  flag: 0.6
  block: 0.8
