rule_id: "S-026"
version: "1.0"
category: harassment_defamation
trigger: post_execution
severity: block
description: >
  任务反馈、纠纷陈述或公开评价内容包含：针对特定 UID 或社区的
  定向人身攻击、捏造事实的诽谤性陈述、协调性负面评价（多账号
  集中短时间内对同一目标提交负面内容），或公开泄露他人私人信息
  （住址、家庭成员）以施压。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  基于事实的任务质量批评（"该接单者未按约定时间完成"、"成品
  质量与描述不符"）是正当反馈，不触发本规则。触发条件为：内容
  包含与任务质量无关的人身攻击、捏造未经核实的严重指控（诈骗、
  违法行为）、或包含他人私人信息以要挟/施压。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测反馈或评价内容中的骚扰和诽谤模式。

  判断标准：
  - 与任务质量无关的人身攻击或侮辱性内容
  - 捏造未经核实的严重指控
  - 公开他人私人信息以施压
  - PASS：基于事实的任务质量反馈，语气即使严厉但无攻击性内容

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【任务反馈】接单者 UID-4421 是骗子！她住在XX路XX号，
      大家注意！上次就骗了我朋友，警察都管不了她这种人。
      强烈建议封号，这种人不配参与协议。
    verdict: BLOCK
    rationale: >
      公开了接单者住址（隐私泄露），声称"骗子"和"警察管不了"
      均为未经核实的严重指控，并含有侮辱性人身攻击，属于骚扰诽谤。
  - input: >
      【任务反馈】本次整理任务完成质量较差：约定整理5个书柜，
      实际仅完成3个，剩余2个未动。与发布方沟通后接单者无回应。
      建议按实际完成量结算积分（60%）。
    verdict: PASS
    rationale: >
      反馈基于具体事实（完成数量、沟通记录），提出合理的积分
      建议，无人身攻击或捏造指控，属于正当任务质量反馈。
  - input: >
      【纠纷陈述】UID-7832 是惯犯骗手，我和另外8个人同时举报，
      他专门坑老实人，据说还有违法前科，大家一起投票让他永久封禁。
    verdict: BLOCK
    rationale: >
      "惯犯骗手"和"违法前科"均为未经核实的严重指控，
      "8个人同时举报"暗示协调性集中举报施压，属于骚扰诽谤行为。
  - input: >
      【任务反馈】配送任务中接单者迟到了45分钟，导致收件人等候。
      沟通后接单者解释称遇到交通管制，已提供照片作为说明。
      建议酌情处理，不影响整体评分。
    verdict: PASS
    rationale: >
      反馈客观陈述迟到事实，记录了接单者说明和佐证，
      最终建议合理，无攻击性内容，属于正当反馈。
confidence_threshold:
  flag: 0.6
  block: 0.8
