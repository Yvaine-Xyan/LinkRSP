rule_id: "S-018"
version: "1.0"
category: hidden_contingency
trigger: pre_publication
severity: flag_for_audit
description: >
  任务正文包含隐藏附加条件，使实际可得积分或实际工作量与正文
  主体描述存在重大落差：扣减条款埋于附录、脚注或"详见社区规则"
  等引用文本中，普通接单者阅读正文无法察觉实质性风险。
audit_method: llm_oracle
queue: semantic_gray_queue
batch_threshold: 50
reasonableness_anchor: >
  正当任务可在正文末尾列出附加条件，但须清晰可见且与主体内容
  一致。若附加条件（如"核验不通过积分全扣"、"须购买指定耗材"、
  "评分低于4.5则积分减半"）仅出现于引用文本或正文最末且字体
  缩小或措辞模糊，则判定为隐藏附加条件。完整透明的条件列表
  不触发本规则。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"隐藏附加条件"模式。

  判断标准：
  - 正文末尾或引用文本存在重大扣分/增量工作条款，正文主体未提示
  - 附加条件与主体描述的积分/工作量存在实质性落差
  - PASS：附加条件清晰列出且与主体一致，或无附加条件

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】社区花园除草，积分60，约2小时
      【正文】负责社区花园杂草清除，提供工具，完成后拍照上传。
      积分60，当天结算。*详细条款见社区治理手册第12章*
      [社区手册第12章：若植被鉴定员评估清除效果低于"良好"，
      扣除40积分，仅保留20积分；若使用非指定工具，积分全额扣回。]
    verdict: BLOCK
    rationale: >
      正文主体未提及任何扣减条件，关键扣分条款（扣40积分、积分全额扣回）
      完全隐藏于外部引用文件中，普通接单者无法从正文中感知实质风险，
      属于隐藏附加条件。
  - input: >
      【标题】整理社区图书角，积分45
      【正文】将图书按类别归位，贴标签，约1.5小时。
      积分构成：基础积分40 + 完成奖励5（须获图书管理员确认）。
      注意：若图书损坏须赔偿，损坏认定以管理员核查为准。
    verdict: PASS
    rationale: >
      积分构成和附加条件（损坏赔偿）均在正文中清晰标注，
      无隐性引用跳转，读者可从正文完整了解所有条款，不触发本规则。
  - input: >
      【标题】帮助老人安装手机应用，积分80，1小时
      【正文】上门协助60岁以上老人安装并演示3款应用，
      积分80立即到账。须签署服务协议（协议内含：若老人投诉
      满意度低于8分，积分全额冻结90天；若需二次上门，须缴纳
      30积分交通押金方可解冻）。
    verdict: BLOCK
    rationale: >
      主体积分承诺"立即到账"，但须签署的协议中含有冻结和押金条款，
      实际上将积分置于不稳定状态，关键风险通过"须签署协议"一笔带过，
      构成隐藏附加条件。
  - input: >
      【标题】协助布置社区展览，积分100
      【正文】展览筹备日工作约3小时：搬运展品、悬挂横幅、摆放桌椅。
      积分100，完成当天结算。
      扣分情形：展品损坏按损坏程度扣10-100积分（由活动负责人认定）。
    verdict: PASS
    rationale: >
      扣分条件直接写在正文中且说明了扣分依据，虽有主观认定成分，
      但条款位置显著、不隐藏，读者可充分知情，不触发本规则。
confidence_threshold:
  flag: 0.6
  block: 0.8
