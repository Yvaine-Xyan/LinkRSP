rule_id: "S-021"
version: "1.0"
category: surveillance_overreach
trigger: pre_publication
severity: flag_for_audit
description: >
  任务要求对接单者实施超出任务合理范围的监控：全程实时 GPS 追踪
  并共享给第三方、持续摄像/录音、强制安装监控应用，或收集与任务
  无关的生物特征、联系人列表等个人数据，侵犯接单者隐私边界。
audit_method: llm_oracle
queue: semantic_gray_queue
batch_threshold: 50
reasonableness_anchor: >
  配送/巡检类任务合理要求轨迹记录（仅用于核验完成路径）不触发
  本规则。触发条件为：要求将实时位置共享给无关第三方、任务结束
  后仍持续追踪、强制安装具有广泛权限的应用、或采集与任务执行
  无关的个人信息（家庭成员、健康状况、财务账号）。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"过度监控"模式。

  判断标准：
  - 监控范围超出任务核验所需（第三方共享、持续追踪、广泛权限）
  - 要求采集与任务无关的个人敏感信息
  - PASS：监控限于任务核验范围，无过度采集

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】社区巡逻志愿者，积分50/次
      【正文】须安装"巡逻助手"App，全程开启GPS共享（实时同步至
      社区管理平台及关联的广告合作商），任务结束后48小时内App
      仍保持后台运行上报位置，用于"行为分析"。
    verdict: BLOCK
    rationale: >
      实时GPS共享至广告合作商远超任务核验范围，任务结束后持续
      48小时追踪构成过度监控，属于监控越界。
  - input: >
      【标题】快递代取，积分15/单
      【正文】代取快递后拍摄快递单号照片上传作为完成凭证，
      系统自动记录取件时间。无需实时位置共享。
    verdict: PASS
    rationale: >
      照片核验和时间记录均限于任务完成核验范围，无过度数据采集，
      不触发本规则。
  - input: >
      【标题】上门家政服务，积分120
      【正文】须在服务开始前提交：本人及同住家庭成员姓名身份证号、
      本人手机通讯录截图、银行卡账号（用于"背景核查"）。
      服务全程须开启手机摄像头直播供发布方实时查看。
    verdict: BLOCK
    rationale: >
      要求同住家庭成员证件、通讯录、银行账号均超出家政服务核验范围；
      全程摄像直播侵犯接单者及服务对象隐私，属于严重监控越界。
  - input: >
      【标题】货物配送核验，积分30
      【正文】配送完成后上传送达照片（含收件人签名），
      系统记录配送路线用于里程核验，核验完成后数据归档删除。
    verdict: PASS
    rationale: >
      配送路线记录用于里程核验且明确归档删除，送达照片为标准完成凭证，
      数据范围与任务性质匹配，无过度监控。
confidence_threshold:
  flag: 0.6
  block: 0.8
