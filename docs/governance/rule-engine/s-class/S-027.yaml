rule_id: "S-027"
version: "1.0"
category: illegal_activity
trigger: pre_publication
severity: block
description: >
  任务描述明确要求、暗示或实质上促成违法活动：运输管制物品、
  协助逃税漏税、伪造证明文件、参与赌博运营、协助未经授权的
  数据访问，或任何其他在任务执行地司法管辖区受法律明确禁止的活动。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  合法的灰色地带服务（网约车、二手交易中介）在任务描述本身
  合规的前提下不触发本规则。触发条件为：任务描述明确提及违禁
  物品（刀具管制、受限药品）、要求提供虚假信息（冒充他人身份）、
  或所述活动在中国大陆司法框架下属于明确违法行为。模糊或偏
  灰色的表述不作主动推断，标注 PASS 并记录疑点供人工复核。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中涉及违法活动的内容。

  判断标准：
  - 明确提及违禁物品、违法操作或要求提供虚假文件
  - 活动在中国大陆司法框架下属于明确违法
  - PASS：合法服务，即使包含灰色业务描述但任务本身合规；模糊表述不主动推断

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】代购特殊商品，不问来源，积分500
      【正文】需要帮忙从某渠道采购一批"特殊进口保健品"，
      海关申报填写为"食品礼品"，勿多问，完成后积分500。
      有驾照者优先，需签保密协议。
    verdict: BLOCK
    rationale: >
      要求虚报海关申报（将商品申报为食品规避检查）属于走私协助，
      "不问来源"暗示商品来源不合法，属于明确涉违法的任务。
  - input: >
      【标题】二手手机回收中介，积分20/单
      【正文】帮助社区居民将旧手机出售给本地回收商，
      核实手机无盗抢记录（IMEI查询），完成交易后积分20。
    verdict: PASS
    rationale: >
      二手手机回收为合法业务，任务要求核查盗抢记录反而是合规步骤，
      不涉及违法活动，不触发本规则。
  - input: >
      【标题】证件照改底色，积分15
      【正文】将身份证照片底色改为白色，并修改出生日期使年龄
      看起来达到18岁要求，用于某平台注册，积分15，快速完成。
    verdict: BLOCK
    rationale: >
      修改身份证信息（出生日期）属于伪造证件，协助平台注册造假
      涉及欺诈，属于明确违法活动。
  - input: >
      【标题】税务咨询助手，协助个体户记账，积分40
      【正文】帮助个体户整理月度收支记录，按发票分类汇总，
      准备提交给会计事务所处理。无需自行报税，仅做初步整理。
    verdict: PASS
    rationale: >
      协助记账整理为合法辅助服务，明确注明由会计事务所正式处理，
      不涉及逃税操作，属于合规任务。
confidence_threshold:
  flag: 0.6
  block: 0.8
