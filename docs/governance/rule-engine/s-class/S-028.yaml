rule_id: "S-028"
version: "1.0"
category: data_retention_abuse
trigger: pre_publication
severity: block
description: >
  任务要求接单者收集、持有或向第三方传递个人数据（姓名、证件号、
  医疗记录、联系方式），且任务描述中缺乏明确的数据使用目的、
  保留期限或删除承诺；或任务结束后接单者被要求保留原始数据备用，
  暗示数据将用于与任务无关的后续用途。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  正当任务可要求接单者在执行期间处理个人信息（调研问卷录入、
  社区名单核对），但须注明数据仅用于当次任务、完成后须删除本地
  副本，且数据不得转交给未在任务中列明的第三方。触发条件为：
  任务结束后仍要求保留原始数据、数据传输目标不明确、或条款中
  含有"数据归发布方所有"等宽泛数据权转让声明。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的数据留存滥用模式。

  判断标准：
  - 任务结束后要求保留或持续传输个人数据
  - 数据使用目的/接收方不明确或超出任务范围
  - 包含宽泛数据权转让或无限期保留声明
  - PASS：数据使用目的明确、限于任务期间、完成后删除

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】社区健康调研，积分30
      【正文】入户采集居民健康信息（姓名、年龄、慢性病史、
      用药情况），录入专用表格后上传至调研平台。
      所有收集数据归调研委托方永久所有，接单者须在本机保留
      原始问卷备份，以备委托方二次核查（保留期不少于1年）。
    verdict: BLOCK
    rationale: >
      要求接单者在任务结束后在本机保留医疗隐私数据至少1年，
      且数据归委托方"永久所有"（宽泛转让条款），属于数据留存滥用。
  - input: >
      【标题】社区通讯录更新，积分20
      【正文】核对并更新社区公告栏上的联系方式（仅公开电话，
      非个人手机号）。更新完成后删除个人设备上的工作文件。
      数据仅用于本次通讯录更新，不做其他用途。
    verdict: PASS
    rationale: >
      数据为公开联系方式，用途明确仅限本次更新，明确要求完成后
      删除本地文件，无数据留存或转让问题，不触发本规则。
  - input: >
      【标题】问卷调查员，积分50/天
      【正文】入户调查收集居民收入水平、投资偏好、家庭资产情况。
      表格实时上传至"数据合作伙伴A、B、C"（名单见附件），
      接单者不得向受访者透露数据去向。
    verdict: BLOCK
    rationale: >
      金融隐私数据传输给未明确列出的多个"合作伙伴"，且要求
      接单者对受访者隐瞒数据去向，属于数据留存和转让滥用，
      同时涉及欺骗性数据收集。
  - input: >
      【标题】调研问卷录入员，积分35
      【正文】将纸质问卷（匿名，无姓名身份证信息）录入系统，
      录入完成后销毁纸质原件。所有数据在平台加密存储，
      仅用于本次社区规划调研，90天后自动删除。
    verdict: PASS
    rationale: >
      数据已匿名处理，无个人身份信息，使用目的明确，
      有明确的90天删除期限，纸质原件录入后销毁，数据处理合规。
confidence_threshold:
  flag: 0.6
  block: 0.8
