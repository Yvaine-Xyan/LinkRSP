rule_id: S-002
version: "1.0"
category: coercion_and_exploitation
trigger: pre_publication
severity: flag_for_audit            # flag_for_audit | block_pending_review
description: >
  识别任务描述中暗示服务方无法在任务中途退出、或以不合理惩罚剥夺退出权的表述（人身自由限制）。
  允许合理的任务要求（例如医疗陪诊需全程陪同），但不得以过度惩罚/威胁性后果实质剥夺退出权。
audit_method: llm_oracle
queue: semantic_gray_queue
batch_threshold: 50
few_shot_examples:
  - label: PASS
    text: "陪诊需全程陪同至检查结束。如遇紧急情况无法继续，请提前说明并协商交接。"
    why: "全程在场是任务要求，但保留退出/交接通道。"
  - label: PASS
    text: "本任务预计2小时，请按约定时间到场；如需提前结束请及时沟通，按实际时长结算。"
    why: "提及提前结束但以协商/按实际结算为主，不构成胁迫。"
  - label: BLOCK
    text: "一旦接单不得中途退出，否则将永久封号并公开黑名单。"
    why: "以极端惩罚威胁剥夺退出权。"
  - label: BLOCK
    text: "任务过程中禁止离开，退出将扣除全部积分并追究责任。"
    why: "剥夺人身自由/退出权，并附带不合理惩罚。"
prompt_template: |
  你是 LinkRSP 平台的语义合规审计代理。请锚定以下原则：
  1) 不与人类作对：不得剥夺人的主体性与退出权
  2) 区分“合理任务要求”与“实质剥夺退出权的惩罚性约束”

  任务：判断文本是否暗示服务方无法中途退出，或以不合理惩罚/威胁性后果实质剥夺退出权。
  判断核心是“退出权是否被实质剥夺”，而不是“是否提到了退出后果”。

  Few-shot 参考：
  - PASS: {{few_shot_pass_1}}
  - PASS: {{few_shot_pass_2}}
  - BLOCK: {{few_shot_block_1}}
  - BLOCK: {{few_shot_block_2}}

  待审文本：
  {{text}}

  仅返回 JSON：
  {
    "verdict": "PASS" | "FLAG" | "BLOCK",
    "confidence": 0.0-1.0,
    "matched_pattern": "简短描述触发原因或 null",
    "rule_id": "S-002",
    "rule_version": "1.0"
  }
condition_notes: >
  - confidence < 0.6：降为 FLAG，进入人工复核。
  - confidence >= 0.8 且 verdict=BLOCK：可自动拦截并通知发布方。
  - 若文本仅表达“需全程在场/需完成某段流程”，但提供交接/沟通/按实际结算路径，一般应 PASS 或 FLAG 而非 BLOCK。
action:
  on_FLAG:
    verdict: PENDING_REVIEW
    notify: submitter
    route_to: human_review_queue
  on_BLOCK:
    verdict: BLOCK
    notify: submitter
    audit_trail: required
false_positive_notes: >
  医疗陪护等场景的“必须全程在场”通常是合理要求。误报主要来自把“任务约束”当成“自由限制”。
  Prompt 必须强调：只有当退出权被实质剥夺（例如威胁性惩罚、非法限制离开）才触发 BLOCK。

