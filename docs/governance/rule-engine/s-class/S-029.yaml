rule_id: "S-029"
version: "1.0"
category: fake_emergency_exploitation
trigger: pre_publication
severity: block
description: >
  任务描述通过制造或夸大危机/紧急情境（"老人突然晕倒需要立刻
  帮助"、"孩子被锁家中"），在接单者产生同情或道德压力的状态下
  诱导其接受远低于正常水平的积分报酬，或放弃正常核验/协议保障。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  真实紧急互助请求（社区内真实发生的突发事件，积分为事后酬谢
  或按协议正常结算）属于协议的正当使用场景，不触发本规则。
  触发条件为：紧急叙事与任务结构性特征不符（长期挂载、批量发布、
  模板化语言）、或利用紧急氛围明确压低积分（"我知道这个积分少
  但情况紧急"）、或要求接单者在紧急名义下跳过核验步骤。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"虚构紧急情境剥削"模式。

  判断标准：
  - 紧急叙事与任务结构特征不符（模板化、批量化、长期挂载）
  - 以紧急氛围为由压低积分或要求跳过核验步骤
  - PASS：真实偶发紧急互助请求，积分合理或为事后酬谢

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】【紧急！！！】独居老人突发不适，急需帮助！积分5
      【正文】（此任务模板已发布47次）需要有人立刻上门，
      老人情况危急，我知道5积分很少但情况来不及谈条件了，
      请先接单再说，核验事后补。
    verdict: BLOCK
    rationale: >
      "此任务模板已发布47次"暴露批量化特征，与"突发"紧急叙事
      矛盾；明确承认积分"很少"并以紧急为由合理化；要求跳过核验，
      三个特征均符合虚构紧急情境剥削。
  - input: >
      【标题】邻居家水管突然爆了，求帮忙关总阀，急！
      【正文】楼上水管爆裂，水正在往下漏，我不在家，
      求附近邻居帮忙找物业或关楼道总阀。事后积分50答谢。
      （非长期任务，解决后将关闭）
    verdict: PASS
    rationale: >
      描述具体且一次性（非批量模板），积分为事后合理答谢，
      无强制压价话术，符合真实突发互助场景，不触发本规则。
  - input: >
      【标题】孩子被锁家中，妈妈在外急哭了！求锁匠上门！积分10
      【正文】（长期招募，积分固定10，全年有效）
      专业锁匠接单，上门不限次数，不核验资质，先开锁后补手续。
      情况紧急积分就这么多请理解。
    verdict: BLOCK
    rationale: >
      "长期招募全年有效"与"孩子被锁"的一次性紧急情境完全矛盾，
      积分10对专业开锁服务明显偏低，且要求不核验资质，
      属于以紧急话术长期压低专业劳务报酬的剥削模式。
  - input: >
      【标题】社区急救演练志愿者，今日下午，积分40
      【正文】配合社区卫生站举办的急救技能演练，担任模拟伤员，
      约2小时，积分40。活动为定期演练，本次参与人数有限，
      先报先得。非真实紧急情况，纯演练活动。
    verdict: PASS
    rationale: >
      急救演练为定期活动，明确说明"非真实紧急情况"，积分合理，
      不利用紧急氛围压价，不触发本规则。
confidence_threshold:
  flag: 0.6
  block: 0.8
