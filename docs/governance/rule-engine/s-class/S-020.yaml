rule_id: "S-020"
version: "1.0"
category: vulnerability_targeting
trigger: pre_publication
severity: block
description: >
  任务描述明确定向招募或利用易受伤害群体（老年人、失业者、负债者、
  未成年人、身心障碍者），以其弱势处境为切入点施加不对等压力，
  或设计明显不利于该群体的条款，形成实质性剥削结构。
audit_method: llm_oracle
queue: semantic_block_queue
batch_threshold: 50
reasonableness_anchor: >
  以易受伤害群体为服务对象（为老人提供代买、为残障者提供辅助）
  属于正当任务，不触发本规则。触发条件为：以该群体的"急需"或
  "困难处境"作为压低积分、施加额外义务、或索取不对等信息的理由；
  或任务条款因专门针对弱势心理而设计（如"我知道你急用积分所以
  这个价格你肯定接"类话术）。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门检测任务描述中的"弱势群体定向剥削"模式。

  判断标准：
  - 明确以弱势处境为杠杆压低积分或施加额外义务
  - 条款结构因针对弱势心理而设计，形成实质不对等
  - PASS：以弱势群体为服务对象但条款公平，或无弱势定向剥削

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】诚招刚失业人员，急需收入者优先，积分仅30
      【正文】整理仓库，约5小时重体力劳动。我知道大家都急用钱，
      所以这个积分不高但肯定会有人接的。失业证明加分。
    verdict: BLOCK
    rationale: >
      明确将"急需收入"的失业状态作为压低积分（5小时重体力仅30分）
      的依据，并以"肯定有人接"暗示利用弱势心理，属于定向剥削。
  - input: >
      【标题】协助独居老人整理药品，上门服务，积分70
      【正文】帮助社区独居老人将药品按服药时间分类整理，
      约1.5小时，积分70结算。须有耐心，无需医学背景。
    verdict: PASS
    rationale: >
      服务对象为老人，但任务条款公平（积分合理、无剥削性条件），
      是以弱势群体为服务受益者而非剥削对象，不触发本规则。
  - input: >
      【标题】残障朋友特招，行动不便者最适合，积分20
      【正文】电话回访调研，在家即可完成，约3小时通话。
      考虑到你们出行不便所以给的机会，别嫌少，总比没有强。
    verdict: BLOCK
    rationale: >
      将行动障碍描述为"所以给的机会"，以居高临下态度施压接单，
      用"别嫌少"话术压制维权心理，3小时工作仅20积分，构成
      针对残障处境的剥削性结构。
  - input: >
      【标题】老年友好型文件整理，适合有耐心的长者参与，积分80
      【正文】社区档案室文件分类整理，步骤清晰，无体力要求。
      约2小时，积分80，按完成量结算，欢迎退休人员参与。
    verdict: PASS
    rationale: >
      以老年人为潜在参与群体，但任务内容（无体力要求、步骤清晰）
      与该群体特点匹配，积分合理，无弱势杠杆或剥削性话术。
confidence_threshold:
  flag: 0.6
  block: 0.8
