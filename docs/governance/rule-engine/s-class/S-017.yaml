rule_id: "S-017"
version: "1.0"
category: bait_and_switch
trigger: pre_publication
severity: flag_for_audit
description: >
  任务描述存在"诱骗切换"结构：标题或摘要突出承诺（高积分、
  特殊技能、轻松工作），但实际要求与条款在正文深处大幅缩水或
  替换，形成实质性信息落差以诱导接单。
audit_method: llm_oracle
queue: semantic_gray_queue
batch_threshold: 50
reasonableness_anchor: >
  合理任务描述应在摘要与正文中对工作内容、积分范围、所需技能
  保持一致。若摘要承诺"轻松"但正文要求高体力/高技能，或摘要
  标注高积分区间但条款中附加大量扣减条件使实际积分趋近于零，
  则判定为诱骗。正当的积分区间（基础积分 + 奖励积分）若结构
  透明则不触发。
prompt_template: |
  你是 LinkRSP 语义审计助手，专门识别任务描述中的"诱骗切换"模式。

  判断标准：
  - 标题/摘要与正文实际要求存在实质性落差（难度、积分、内容均不符）
  - 积分高于正文实际可达范围，且扣减条件隐藏在末尾
  - PASS：摘要与正文一致，或区间结构透明

  示例：
  {{few_shot_examples}}

  待审文本：
  {{text}}

  请以 JSON 格式返回：{"verdict": "BLOCK" 或 "PASS", "confidence": 0.0-1.0, "rationale": "判断依据"}
few_shot_examples:
  - input: >
      【标题】简单整理房间，积分丰厚，2小时完成
      【正文】需完成：全屋深度清洁（含厨房油污、浴室水垢）、家具搬移归位、
      垃圾分类清运。基础积分50，但若未获得5星评价则全额扣回，
      仅保留10积分完成奖励。
    verdict: BLOCK
    rationale: >
      标题承诺"简单"和"积分丰厚"，实际要求是深度清洁+搬家级工作量，
      且扣分条款使实际可得积分仅10（与"丰厚"严重不符），属于典型诱骗切换。
  - input: >
      【标题】社区文件录入，每小时约30-50积分
      【正文】将纸质记录录入电子表格，约3小时，需打字速度中等。
      积分按实际核验时长结算，30-50区间视核验等级而定（V1对应30，V2对应50）。
    verdict: PASS
    rationale: >
      摘要与正文内容一致，积分区间有透明的核验等级对应关系，
      无隐性扣减条款，不属于诱骗切换。
  - input: >
      【标题】轻松送餐，边走边赚，时间自由
      【正文】须持有电动车驾照，每日配送量不低于50单，低于50单当日积分清零，
      风雨天须全勤出工否则扣除当周积分，须缴纳200积分押金。
    verdict: BLOCK
    rationale: >
      "轻松、时间自由"与"每日50单硬性指标、风雨全勤、押金扣除"
      形成严重落差，实际为高强度强制性工作，标题系诱骗性描述。
  - input: >
      【标题】协助组织社区健步走活动，积分约80-120
      【正文】负责活动当天签到登记（约1.5小时），协助引导路线，
      积分区间含基础80+完成奖励40（需全程在场并获队长确认）。
    verdict: PASS
    rationale: >
      积分区间、工作内容、时长在摘要与正文中一致，
      奖励结构清晰，无诱骗性落差。
confidence_threshold:
  flag: 0.6
  block: 0.8
